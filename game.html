<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Game Weather</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    #container {
      max-width: 900px;
      margin: auto;
      padding: 40px;
    }

    #stadium {
      margin-top: 30px;
      padding: 40px;
      background: #151a24;
      border-radius: 12px;
    }

    #windArea {
      margin-top: 20px;
      font-size: 32px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    #field {
      margin: 30px auto;
      width: 600px;
      height: 260px;
      background: #1f7a3a;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, .6) inset;
    }

    .yardLine {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: white;
      opacity: .6;
    }

    #field::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: white;
      opacity: .25;
    }

    .y10 { left: 10%; }
    .y20 { left: 20%; }
    .y30 { left: 30%; }
    .y40 { left: 40%; }
    .y50 { left: 50%; }
    .y60 { left: 60%; }
    .y70 { left: 70%; }
    .y80 { left: 80%; }
    .y90 { left: 90%; }

    .fieldLine:nth-child(1) { top: 50px; }
    .fieldLine:nth-child(2) { top: 100px; }
    .fieldLine:nth-child(3) { top: 150px; }

    .windArrow {
      font-size: 36px;
      opacity: .8;
      letter-spacing: 10px;
      transition: transform .3s;
    }

    #windLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .windParticle {
      position: absolute;
      font-size: 22px;
      opacity: .8;
      animation: windFloat 6s linear infinite;
    }

    @keyframes windFloat {
      0% {
        transform: translateY(-30px);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(220px);
        opacity: 0;
      }
    }

    .endzone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8%;
      background: #155e2b;
    }

    .leftEZ { left: 0; }
    .rightEZ { right: 0; }

    .y50 {
      left: 50%;
      width: 3px;
      background: white;
      opacity: .9;
    }

    /* Player Weather Performance Specs */
    #playerStatsBox {
      margin-top: 40px;
      padding: 30px;
      background: rgba(18, 24, 38, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .weatherTabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .weatherTab {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      transition: all 0.3s;
      border: 1px solid transparent;
    }

    .weatherTab:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .weatherTab.activeTab {
      background: rgba(255, 176, 32, 0.15);
      color: #ffb020;
      border: 1px solid rgba(255, 176, 32, 0.5);
      box-shadow: 0 0 15px rgba(255, 176, 32, 0.2);
    }

    .positionTabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .posTab {
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.6);
      transition: all 0.2s;
    }

    .posTab:hover { background: rgba(255, 255, 255, 0.1); color: white; }
    
    .posTab.activePos { 
      background: #4da6ff; 
      color: #111; 
      box-shadow: 0 0 10px rgba(77, 166, 255, 0.4); 
    }

    .statsContainer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .playerCard {
      flex: 1;
      background: linear-gradient(145deg, #182030, #131925);
      border-radius: 10px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .playerHeader {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      width: 100%;
      justify-content: center;
    }

    .playerImg {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #111;
      border: 2px solid rgba(255,255,255,0.2);
      object-fit: cover;
    }

    .playerName {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .playerPos {
      font-size: 12px;
      color: #ffb020;
      font-weight: bold;
    }

    .statGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      width: 100%;
    }

    .statItem {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .statLabel {
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .statValue {
      font-size: 18px;
      font-weight: 800;
      color: #4da6ff;
    }

  </style>
</head>

<body>

  <div id="container">
    <h1 id="matchup"></h1>

    <div id="stadium">
      <h2 id="stadiumName"></h2>

      <div id="windArea">
        <div class="windArrow">↑</div>
        <div class="windArrow">↑</div>
        <div class="windArrow">↑</div>
      </div>

      <div id="field">
        <div id="windLayer"></div>

        <div class="endzone leftEZ"></div>
        <div class="endzone rightEZ"></div>

        <div class="yardLine y10"></div>
        <div class="yardLine y20"></div>
        <div class="yardLine y30"></div>
        <div class="yardLine y40"></div>
        <div class="yardLine y50"></div>
        <div class="yardLine y60"></div>
        <div class="yardLine y70"></div>
        <div class="yardLine y80"></div>
        <div class="yardLine y90"></div>
      </div>

      <p id="weatherInfo">Loading weather...</p>

      <!-- Player Weather Performance Section -->
      <div id="playerStatsBox">
        <h3 style="margin-top:0; color:#ffb020; font-weight:600; font-size:18px; text-transform:uppercase; letter-spacing:1px; margin-bottom:15px; text-shadow:0 0 10px rgba(255,176,32,0.3);">Key Player Weather Performance</h3>
        
        <div class="weatherTabs">
          <div class="weatherTab activeTab" onclick="setWeatherCondition('optimal', this)">Dry / Optimal</div>
          <div class="weatherTab" onclick="setWeatherCondition('wind', this)">High Wind</div>
          <div class="weatherTab" onclick="setWeatherCondition('wet', this)">Rain / Snow</div>
          <div class="weatherTab" onclick="setWeatherCondition('cold', this)">Freezing</div>
        </div>

        <div class="positionTabs">
          <div class="posTab activePos" onclick="setPosition('QB', this)">QB</div>
          <div class="posTab" onclick="setPosition('RB', this)">RB</div>
          <div class="posTab" onclick="setPosition('WR', this)">WR</div>
        </div>

        <div class="statsContainer">
          <div class="playerCard" id="awayPlayerCard">
            <!-- Populated by JS -->
          </div>

          <div style="display:flex; align-items:center; justify-content:center; padding:0 20px; font-weight:900; font-size:24px; opacity:0.3; font-style:italic;">
            VS
          </div>

          <div class="playerCard" id="homePlayerCard">
             <!-- Populated by JS -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const away = params.get("away")
    const home = params.get("home")

    document.getElementById("matchup").innerText = away + " @ " + home

    const stadiums = {
      PHI: { name: "Lincoln Financial Field", orientation: 15 },
      BUF: { name: "Highmark Stadium", orientation: 60 },
      KC: { name: "Arrowhead Stadium", orientation: 82 },
      ATL: { name: "Mercedes-Benz Stadium", orientation: 0 }
    }

    const stadium = stadiums[home]

    if (stadium) {
      document.getElementById("stadiumName").innerText = stadium.name
    }

    let windDirection = 220 + 180
    const fieldOrientation = stadium.orientation

    let diff = Math.abs(windDirection - fieldOrientation)

    if (diff > 180) {
      diff = 360 - diff
    }

    let windType = ""

    if (diff < 30) {
      windType = "ALONG FIELD"
    } else if (diff > 60 && diff < 120) {
      windType = "CROSSWIND"
    } else {
      windType = "ANGLED WIND"
    }

    const arrows = document.querySelectorAll(".windArrow")

    arrows.forEach(arrow => {
      arrow.style.transform = "rotate(" + windDirection + "deg)"
    })

    document.getElementById("weatherInfo").innerText =
      "Wind: 22 mph " + windType + " | Temp: 31°F"

    const windLayer = document.getElementById("windLayer")

    for (let i = 0; i < 8; i++) {
      const p = document.createElement("div")
      p.className = "windParticle"
      p.innerText = "↑"
      p.style.top = Math.random() * 180 + "px"
      p.style.animationDelay = (Math.random() * 6) + "s"
      p.style.transform = "rotate(" + windDirection + "deg)"
      windLayer.appendChild(p)
    }

    // --- PLAYER WEATHER PERFORMANCE MOCK DATA & LOGIC ---
    const positionLabels = {
      QB: ['Comp %', 'TD/INT', 'Pass Yds'],
      RB: ['Carries', 'YPC', 'Rush Yds'],
      WR: ['Rec', 'Rec Yds', 'Rec TDs']
    };

    const playersData = {
      NYJ: {
        QB: { name: "Aaron Rodgers", img: "https://a.espncdn.com/i/headshots/nfl/players/full/8439.png", stats: { optimal: { s1: "64.5%", s2: "3.2", s3: 254 }, wind: { s1: "60.2%", s2: "2.1", s3: 221 }, wet: { s1: "61.8%", s2: "2.5", s3: 236 }, cold: { s1: "62.1%", s2: "2.8", s3: 243 } } },
        RB: { name: "Breece Hall", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4429205.png", stats: { optimal: { s1: "18", s2: "4.8", s3: 86 }, wind: { s1: "21", s2: "4.5", s3: 94 }, wet: { s1: "22", s2: "4.2", s3: 92 }, cold: { s1: "20", s2: "4.3", s3: 86 } } },
        WR: { name: "Garrett Wilson", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4430852.png", stats: { optimal: { s1: "6.5", s2: "88", s3: "0.8" }, wind: { s1: "5.0", s2: "62", s3: "0.4" }, wet: { s1: "5.5", s2: "68", s3: "0.5" }, cold: { s1: "5.8", s2: "72", s3: "0.6" } } }
      },
      BUF: {
        QB: { name: "Josh Allen", img: "https://a.espncdn.com/i/headshots/nfl/players/full/3918298.png", stats: { optimal: { s1: "63.5%", s2: "2.1", s3: 265 }, wind: { s1: "58.5%", s2: "1.4", s3: 225 }, wet: { s1: "60.2%", s2: "1.6", s3: 240 }, cold: { s1: "61.5%", s2: "1.8", s3: 252 } } },
        RB: { name: "James Cook", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4362628.png", stats: { optimal: { s1: "15", s2: "4.5", s3: 68 }, wind: { s1: "18", s2: "4.2", s3: 75 }, wet: { s1: "19", s2: "4.0", s3: 76 }, cold: { s1: "17", s2: "4.1", s3: 70 } } },
        WR: { name: "Keon Coleman", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4831627.png", stats: { optimal: { s1: "5.0", s2: "65", s3: "0.5" }, wind: { s1: "4.0", s2: "48", s3: "0.2" }, wet: { s1: "4.5", s2: "52", s3: "0.3" }, cold: { s1: "4.8", s2: "55", s3: "0.4" } } }
      },
      PHI: {
        QB: { name: "Jalen Hurts", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4040715.png", stats: { optimal: { s1: "66.5%", s2: "2.4", s3: 235 }, wind: { s1: "61.1%", s2: "1.6", s3: 198 }, wet: { s1: "63.2%", s2: "1.9", s3: 215 }, cold: { s1: "64.0%", s2: "2.1", s3: 220 } } },
        RB: { name: "Saquon Barkley", img: "https://a.espncdn.com/i/headshots/nfl/players/full/3929630.png", stats: { optimal: { s1: "19", s2: "4.7", s3: 89 }, wind: { s1: "23", s2: "4.4", s3: 101 }, wet: { s1: "25", s2: "4.1", s3: 103 }, cold: { s1: "22", s2: "4.3", s3: 95 } } },
        WR: { name: "A.J. Brown", img: "https://a.espncdn.com/i/headshots/nfl/players/full/3929630.png", stats: { optimal: { s1: "7.2", s2: "95", s3: "0.8" }, wind: { s1: "5.5", s2: "65", s3: "0.4" }, wet: { s1: "6.1", s2: "72", s3: "0.5" }, cold: { s1: "6.5", s2: "80", s3: "0.6" } } }
      },
      KC: {
        QB: { name: "Patrick Mahomes", img: "https://a.espncdn.com/i/headshots/nfl/players/full/3139477.png", stats: { optimal: { s1: "68.2%", s2: "3.5", s3: 295 }, wind: { s1: "63.5%", s2: "2.5", s3: 260 }, wet: { s1: "64.8%", s2: "2.8", s3: 275 }, cold: { s1: "65.5%", s2: "3.0", s3: 280 } } },
        RB: { name: "Isiah Pacheco", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4360310.png", stats: { optimal: { s1: "16", s2: "4.6", s3: 74 }, wind: { s1: "20", s2: "4.3", s3: 86 }, wet: { s1: "21", s2: "4.1", s3: 86 }, cold: { s1: "18", s2: "4.4", s3: 79 } } },
        WR: { name: "Rashee Rice", img: "https://a.espncdn.com/i/headshots/nfl/players/full/4429007.png", stats: { optimal: { s1: "6.8", s2: "82", s3: "0.7" }, wind: { s1: "5.8", s2: "62", s3: "0.4" }, wet: { s1: "6.2", s2: "68", s3: "0.5" }, cold: { s1: "6.4", s2: "74", s3: "0.6" } } }
      }
    };

    const defaultImg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

    function getPlayer(team, pos) {
      if(playersData[team] && playersData[team][pos]) return playersData[team][pos];
      // Generate default if not implemented
      let names = { QB:"Starting QB", RB:"Starting RB", WR:"Starting WR" };
      let defaultStats = {
        QB: { optimal: { s1:"65%", s2:"2.0", s3:240 }, wind: { s1:"60%", s2:"1.5", s3:210 }, wet: { s1:"61%", s2:"1.7", s3:220 }, cold: { s1:"62%", s2:"1.8", s3:225 } },
        RB: { optimal: { s1:"15", s2:"4.2", s3:65 }, wind: { s1:"18", s2:"4.0", s3:72 }, wet: { s1:"19", s2:"3.9", s3:74 }, cold: { s1:"17", s2:"4.0", s3:68 } },
        WR: { optimal: { s1:"5", s2:"65", s3:"0.5" }, wind: { s1:"4", s2:"45", s3:"0.2" }, wet: { s1:"4.5", s2:"50", s3:"0.3" }, cold: { s1:"4.8", s2:"55", s3:"0.4" } }
      };
      return {
        name: (team || "TEAM") + " " + names[pos],
        img: defaultImg,
        stats: defaultStats[pos]
      };
    }

    let activeCondition = 'optimal';
    let activePosition = 'QB';

    function renderPlayerCard(player, condition, posType) {
      const stats = player.stats[condition];
      const labels = positionLabels[posType];
      return `
        <div class="playerHeader">
          <img class="playerImg" src="${player.img}" alt="${player.name}" onerror="this.src=defaultImg">
          <div style="text-align:left;">
            <div class="playerName">${player.name}</div>
            <div class="playerPos">${posType}</div>
          </div>
        </div>
        <div class="statGrid">
          <div class="statItem">
            <div class="statLabel">${labels[0]}</div>
            <div class="statValue">${stats.s1}</div>
          </div>
          <div class="statItem">
            <div class="statLabel">${labels[1]}</div>
            <div class="statValue">${stats.s2}</div>
          </div>
          <div class="statItem">
            <div class="statLabel">${labels[2]}</div>
            <div class="statValue">${stats.s3}</div>
          </div>
        </div>
      `;
    }

    function updateCards() {
      const container = document.querySelector('.statsContainer');
      container.style.opacity = '0';
      container.style.transform = 'scale(0.98)';
      
      let p1 = getPlayer(away, activePosition);
      let p2 = getPlayer(home, activePosition);

      setTimeout(() => {
        document.getElementById('awayPlayerCard').innerHTML = renderPlayerCard(p1, activeCondition, activePosition);
        document.getElementById('homePlayerCard').innerHTML = renderPlayerCard(p2, activeCondition, activePosition);
        container.style.opacity = '1';
        container.style.transform = 'scale(1)';
      }, 200);
    }

    function setWeatherCondition(cond, el) {
      if (el) {
        document.querySelectorAll('.weatherTab').forEach(t => t.classList.remove('activeTab'));
        el.classList.add('activeTab');
      }
      activeCondition = cond;
      updateCards();
    }

    function setPosition(pos, el) {
      if (el) {
        document.querySelectorAll('.posTab').forEach(t => t.classList.remove('activePos'));
        el.classList.add('activePos');
      }
      activePosition = pos;
      updateCards();
    }

    // Initialize
    updateCards();

  </script>

</body>

</html>
