.matchup{

.teamLogo{

.weatherBlock{

.impactFill{

.legend{
display:flex;

.legendBlock{

align-items:center;

}

.legendBlock:hover{

}

.legendScore{

font-size:16px;
letter-spacing:.5px;

}

.legendText{
font-size:11px;
opacity:.65;
}

.lowBlock{
border-left:5px solid #4b5568;
}

.moderateBlock{
border-left:5px solid #f59e0b;
box-shadow:0 0 6px rgba(245,158,11,.35);
}

.highBlock{
border-left:5px solid #ef4444;
box-shadow:0 0 10px rgba(239,68,68,.45);
}

.extremeBlock{
border-left:5px solid #ff2b2b;
box-shadow:0 0 16px rgba(255,40,40,.9);
}

.extremeBlock .legendScore{
color:#ff4d4d;

#board{
max-width:1500px;
margin:auto;
padding:20px;

body{
margin:0;

background:#0b0f1a;

header{

padding:18px;

#gameGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(4,1fr);

gap:0;

height:calc(100vh - 150px);

border:1px solid rgba(255,255,255,0.04);
}

.card{
background:linear-gradient(180deg,#1b2230,#111722);

border-bottom:1px solid rgba(255,255,255,0.05);

box-shadow:0 8px 20px rgba(0,0,0,.45);

flex-direction:column;
justify-content:space-between;

.impactLow{
border-left:4px solid #3a4154;
opacity:.75;
}

.impactModerate{
border-left:4px solid #f5a623;
box-shadow:0 0 6px rgba(245,166,35,.3);
}

.impactHigh{
border-left:4px solid #ff4d4d;
box-shadow:0 0 14px rgba(255,77,77,.6);
animation:impactPulse 2s infinite, impactBackground 4s infinite;
}

.impactExtreme{
border-left:4px solid #ff2b2b;
box-shadow:0 0 18px rgba(255,40,40,.9);
animation:impactPulse 2s infinite, impactBackground 5s infinite;
transform:scale(1.02);
}

width:38px;
height:38px;
font-size:16px;
}

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

font-weight:700;
font-size:15px;

background:#1f2430;
border:2px solid rgba(255,255,255,.1);

transition:.2s;
}

.impactDial{
width:46px;
height:46px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:radial-gradient(circle at center,#1f2430 40%, #0b0f1a 100%);

border:3px solid rgba(255,255,255,.1);

position:relative;

box-shadow:0 0 8px rgba(0,0,0,.6) inset;
}

.impactNumber{
font-weight:800;
font-size:18px;
letter-spacing:.5px;
}

.impact1,.impact2{
border-color:#4b5568;
color:#9ca3af;
}

.impact3,.impact4,.impact5{
border-color:#f59e0b;
color:#f59e0b;
box-shadow:0 0 8px rgba(245,158,11,.4);
}

.impact6,.impact7,.impact8{
border-color:#ef4444;
color:#ef4444;
box-shadow:0 0 12px rgba(239,68,68,.6);
}

.impact9,.impact10{
border-color:#ff2b2b;
color:#ff2b2b;
box-shadow:0 0 18px rgba(255,40,40,.9);
animation:impactPulse 1.5s infinite;
}

@keyframes impactBackground{

0%{background:#151a24;}
50%{background:#1f1a1a;}
100%{background:#151a24;}

}

@keyframes impactPulse{

0%{box-shadow:0 0 8px rgba(255,77,77,.4);}
50%{box-shadow:0 0 18px rgba(255,77,77,.9);}
100%{box-shadow:0 0 8px rgba(255,77,77,.4);}

}

.weatherCompact{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
margin-top:6px;
gap:10px;
}

.weatherItem{
display:flex;
align-items:center;
gap:5px;
opacity:.9;
}

.weatherIcon{
opacity:.7;
font-size:14px;
}

.weatherInsight{
margin-top:8px;
font-size:12px;
line-height:1.3;
opacity:.75;
font-style:italic;
}


.card:hover{
background:#1f2736;
transform:translateY(-6px);
box-shadow:0 14px 32px rgba(0,0,0,.7);
}

.impact{
font-weight:bold;
color:#ffb020;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

background-size:40px 40px;

pointer-events:none;
z-index:-1;
}

.status{
font-weight:bold;
}

.live{
color:#ff3b3b;

}

.live::before{
content:"";
width:8px;
height:8px;
background:#ff3b3b;
border-radius:50%;
display:inline-block;
margin-right:6px;
box-shadow:0 0 8px #ff3b3b;
animation:livePulse 1.5s infinite;
}

@keyframes livePulse{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}


.impactLevel{
font-weight:bold;
font-size:14px;
letter-spacing:.5px;

const games=[

{away:"DAL",home:"PHI",status:"UPCOMING",impact:2},

const grid=document.getElementById("gameGrid")
games.sort((a,b)=>{

if(a.status==="LIVE") return -1
if(b.status==="LIVE") return 1

if(a.status==="UPCOMING") return -1

return 0

})

games.forEach(game=>{
let temp = Math.floor(Math.random()*60) + 10
let wind = Math.floor(Math.random()*35)
let precipOptions = ["none","light","moderate","heavy"]
let precipTypeOptions = ["none","rain","snow"]

let precipRate = precipOptions[Math.floor(Math.random()*precipOptions.length)]
let precipType = precipTypeOptions[Math.floor(Math.random()*precipTypeOptions.length)]
let insight = generateInsight(temp, wind, precipRate, precipType)
let impactScore = calculateImpact(temp, wind, precipRate, precipType)




let impactClass="impactLow"

if(impactScore >=3 && impactScore <=5){

}

if(impactScore >=6 && impactScore <=8){

function openGame(matchup){

alert("Open weather details for " + matchup)

}

async function getWeather(station){

const response = await fetch(`https://api.weather.gov/stations/${station}/observations/latest`)
const data = await response.json()

let tempC = data.properties.temperature?.value
let windMS = data.properties.windSpeed?.value

let tempF = tempC ? Math.round((tempC * 9/5) + 32) : "--"
let windMPH = windMS ? Math.round(windMS * 2.237) : "--"

return {
temp: tempF,
wind: windMPH
}

}
function calculateImpact(temp, wind, precipRate, precipType){

let score = 0

// WIND IMPACT
if(wind >= 10 && wind < 15) score += 1
if(wind >= 15 && wind < 20) score += 2
if(wind >= 20 && wind < 25) score += 3
if(wind >= 25 && wind < 30) score += 4
if(wind >= 30) score += 5

// PRECIPITATION RATE
if(precipRate === "light") score += 1
if(precipRate === "moderate") score += 2
if(precipRate === "heavy") score += 3

// PRECIP TYPE
if(precipType === "rain") score += 1
if(precipType === "snow") score += 2
if(precipType === "freezing") score += 3

// TEMPERATURE
if(temp <= 50 && temp > 32) score += 1
if(temp <= 32 && temp > 20) score += 2
if(temp <= 20) score += 3

// CAP AT 10
if(score > 10) score = 10

return score
}

function generateInsight(temp, wind, precipRate, precipType){

if(wind >= 25){
return "Severe winds could significantly impact passing and kicking."
}

if(wind >= 18){
return "Strong winds may limit deep passing plays."
}

if(precipType === "snow"){
return "Snow may reduce visibility and ball control."
}

if(precipType === "rain"){
return "Wet conditions may lead to more rushing attempts."
}

if(temp <= 25){
return "Cold temperatures may affect kicking distance."
}

return "Minimal weather impact expected."

}
